<div class="glass-form-card">
    <h2>Create New Task</h2>
    <form (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="title">Title <span class="required">*</span></label>
            <input type="text" id="title" name="title" [(ngModel)]="title" placeholder="What needs to be done?"
                required>
        </div>

        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea id="description" name="description" [(ngModel)]="description"
                placeholder="Add some details..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="dueDate">Due Date</label>
                <input type="date" id="dueDate" name="dueDate" [(ngModel)]="dueDate">
            </div>

            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority" [(ngModel)]="priority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-add" [disabled]="!title.trim()">
            <span class="plus-icon">+</span> Add Task
        </button>
    </form>
</div>
